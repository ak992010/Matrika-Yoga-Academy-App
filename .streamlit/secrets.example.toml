# Paste this into Streamlit Community Cloud > App settings > Secrets.
# Replace all placeholder values before saving.

google_sheet_id = "your-google-sheet-id"
admin_password = "choose-a-strong-password"
smtp_host = "smtp.gmail.com"
smtp_port = 587
smtp_username = "your-email@gmail.com"
smtp_password = "your-app-password"
smtp_from_email = "your-email@gmail.com"
smtp_from_name = "Matrika Academy"
razorpay_key_id = "rzp_live_your_key_id"
razorpay_key_secret = "your-razorpay-key-secret"

[google_service_account_json]
type = "service_account"
project_id = "your-project-id"
private_key_id = "replace-me"
private_key = """-----BEGIN PRIVATE KEY-----
REPLACE_ME
-----END PRIVATE KEY-----
"""
client_email = "service-account@your-project.iam.gserviceaccount.com"
client_id = "replace-me"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/service-account"
