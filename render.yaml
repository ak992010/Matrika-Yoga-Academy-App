services:
  - type: web
    name: matrika-yoga-academy-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn seo_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    domains:
      - matrikayogaacademy.com
    envVars:
      - key: APP_BASE_PATH
        value: /app
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Matrika Academy
